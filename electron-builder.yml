appId: TryMonitor
icon: build/icon.ico
productName: Try Monitor
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
  certificateFile: null
  certificatePassword: null

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false
