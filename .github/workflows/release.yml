name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run generate-icon

      - run: npm run build

      - run: npx electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: installer-msi
          path: release/*.msi

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: installer-nsis
          path: release/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.msi
            release/*.exe
          generate_release_notes: true
